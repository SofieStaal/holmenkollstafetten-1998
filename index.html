<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holmenkollstafetten 2026 — Velg din etappe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">Lørdag 9. mai 2026 · Bislett Stadion</p>
      <svg class="wordart" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" role="heading" aria-level="1" aria-label="Holmenkollstafetten">
        <defs>
          <linearGradient id="wordart-rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#ff0000"/>
            <stop offset="14%"  stop-color="#ff8800"/>
            <stop offset="28%"  stop-color="#ffdd00"/>
            <stop offset="42%"  stop-color="#00cc00"/>
            <stop offset="57%"  stop-color="#0088ff"/>
            <stop offset="71%"  stop-color="#4400ff"/>
            <stop offset="85%"  stop-color="#8800cc"/>
            <stop offset="100%" stop-color="#ff0088"/>
          </linearGradient>
          <linearGradient id="wordart-shine" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="rgba(255,255,255,0.6)"/>
            <stop offset="45%"  stop-color="rgba(255,255,255,0)"/>
            <stop offset="55%"  stop-color="rgba(255,255,255,0)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0.2)"/>
          </linearGradient>
          <path id="wordart-arc" d="M 30,190 Q 450,30 870,190" fill="none"/>
          <filter id="wordart-shadow">
            <feDropShadow dx="4" dy="4" stdDeviation="1" flood-color="#000" flood-opacity="0.7"/>
          </filter>
        </defs>
        <!-- 3D depth layers -->
        <text font-family="Impact,'Arial Black',sans-serif" font-size="72" font-weight="bold" fill="#330033" filter="url(#wordart-shadow)">
          <textPath href="#wordart-arc" startOffset="50%" text-anchor="middle">HOLMENKOLLSTAFETTEN</textPath>
        </text>
        <!-- Rainbow fill -->
        <text font-family="Impact,'Arial Black',sans-serif" font-size="72" font-weight="bold" fill="url(#wordart-rainbow)" stroke="#222" stroke-width="1.5">
          <textPath href="#wordart-arc" startOffset="50%" text-anchor="middle">HOLMENKOLLSTAFETTEN</textPath>
        </text>
        <!-- Glossy shine overlay -->
        <text font-family="Impact,'Arial Black',sans-serif" font-size="72" font-weight="bold" fill="url(#wordart-shine)">
          <textPath href="#wordart-arc" startOffset="50%" text-anchor="middle">HOLMENKOLLSTAFETTEN</textPath>
        </text>
      </svg>
      <svg class="wordart-lede" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg" aria-label="15 etapper. Ett lag. Ønsk deg etappen som passer deg best.">
        <defs>
          <path id="wave1" d="M 20,50 C 120,20 200,70 300,40 C 400,10 500,65 600,35 C 700,10 760,50 780,45" fill="none"/>
          <path id="wave2" d="M 20,130 C 100,100 180,145 280,110 C 380,80 460,140 560,105 C 660,75 740,125 780,115" fill="none"/>
        </defs>
        <!-- Shadow/doubled text — chunky offset -->
        <text font-family="Impact,'Arial Black',sans-serif" font-size="36" font-weight="bold" font-style="italic" fill="#000084" stroke="#000084" stroke-width="3">
          <textPath href="#wave1" startOffset="50%" text-anchor="middle" dx="8" dy="8">15 etapper. Ett lag.</textPath>
        </text>
        <text font-family="Impact,'Arial Black',sans-serif" font-size="30" font-weight="bold" font-style="italic" fill="#000084" stroke="#000084" stroke-width="3">
          <textPath href="#wave2" startOffset="50%" text-anchor="middle" dx="8" dy="8">Ønsk deg etappen som passer deg best.</textPath>
        </text>
        <!-- Front text -->
        <text font-family="Impact,'Arial Black',sans-serif" font-size="36" font-weight="bold" font-style="italic" fill="#39c9fe">
          <textPath href="#wave1" startOffset="50%" text-anchor="middle">15 etapper. Ett lag.</textPath>
        </text>
        <text font-family="Impact,'Arial Black',sans-serif" font-size="30" font-weight="bold" font-style="italic" fill="#39c9fe">
          <textPath href="#wave2" startOffset="50%" text-anchor="middle">Ønsk deg etappen som passer deg best.</textPath>
        </text>
      </svg>
      <div class="hero-meta">
        <span class="pill">4 uker igjen</span>
        <span class="pill">15 løpere</span>
        <span class="pill">18,4 km totalt</span>
      </div>
    </div>
  </header>

  <main>
    <section class="controls">
      <div class="filters">
        <button class="filter active" data-filter="all">Alle</button>
        <button class="filter" data-filter="flat">Flatt</button>
        <button class="filter" data-filter="climb">Motbakke</button>
        <button class="filter" data-filter="downhill">Nedoverbakke</button>
        <button class="filter" data-filter="hilly">Kupert</button>
        <button class="filter" data-filter="no-wishes">Uten ønsker</button>
        <span class="filter-divider" aria-hidden="true"></span>
        <button class="filter sort-toggle" id="sort-length" aria-pressed="false">Lengde <span class="arrow">↑</span></button>
      </div>
    </section>

    <section class="legs" id="legs"></section>
  </main>

  <footer>
    <p><a href="https://holmenkollstafetten.no/løypekart" target="_blank" rel="noreferrer">Se offisielt løypekart</a></p>
  </footer>

  <dialog id="pick-dialog">
    <form method="dialog">
      <h2>Etappe <span id="dialog-leg-num"></span></h2>
      <p id="dialog-leg-desc"></p>
      <label>
        Navnet ditt
        <input type="text" id="runner-name" required maxlength="40" placeholder="F.eks. Brian" />
      </label>
      <div class="dialog-actions">
        <button type="button" id="cancel">Avbryt</button>
        <button type="submit" id="confirm">Ønsk deg denne</button>
      </div>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
